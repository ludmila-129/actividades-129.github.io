<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELE · Actividades</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #008080;   /* teal de fondo tipo Win95 */
      --win-bg:    #C0C0C0;   /* gris clásico de ventana  */
      --win-dark:  #808080;
      --win-darker:#404040;
      --win-light: #FFFFFF;
      --title-bar: #000080;   /* azul oscuro de barra de título */
      --title-txt: #FFFFFF;
      --text:      #000000;
      --text-2:    #404040;
      --btn-face:  #C0C0C0;
      --err-bg:    #FF0000;
      --err-txt:   #FFFFFF;
      --ok-bg:     #008000;
      --ok-txt:    #FFFFFF;
      --warn-bg:   #808000;
      --warn-txt:  #FFFFFF;
      --highlight: #000080;
      --highlight-txt: #FFFFFF;
      --tag-num:   #000080;
      --tag-verb:  #800000;
      --tag-pron:  #000080;
      --tag-orden: #800080;
    }

    body {
      font-family: 'Arial', sans-serif;
      font-size: 20px;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      background-image: radial-gradient(circle, #006666 1px, transparent 1px);
      background-size: 24px 24px;
      zoom: 1.5;
    }

    /* ── BORDE 3D estilo Win95 ── */
    .raised {
      border-top:    2px solid var(--win-light);
      border-left:   2px solid var(--win-light);
      border-right:  2px solid var(--win-darker);
      border-bottom: 2px solid var(--win-darker);
    }
    .sunken {
      border-top:    2px solid var(--win-darker);
      border-left:   2px solid var(--win-darker);
      border-right:  2px solid var(--win-light);
      border-bottom: 2px solid var(--win-light);
    }

    /* ── VENTANA PRINCIPAL ── */
    .main-window {
      max-width: 900px;
      margin: 0 auto;
      background: var(--win-bg);
    }
    .main-window.raised {
      border-top:    2px solid var(--win-light);
      border-left:   2px solid var(--win-light);
      border-right:  2px solid var(--win-darker);
      border-bottom: 2px solid var(--win-darker);
    }

    /* ── BARRA DE TÍTULO ── */
    .title-bar {
      background: linear-gradient(to right, var(--title-bar), #1084d0);
      padding: 3px 4px 3px 6px;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
    }
    .title-bar-text {
      color: var(--title-txt);
      font-weight: bold;
      font-size: 12px;
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .title-icon { font-size: 14px; }
    .title-buttons { display: flex; gap: 2px; }
    .title-btn {
      width: 16px;
      height: 14px;
      background: var(--btn-face);
      border-top:    1px solid var(--win-light);
      border-left:   1px solid var(--win-light);
      border-right:  1px solid var(--win-darker);
      border-bottom: 1px solid var(--win-darker);
      font-size: 9px;
      cursor: default;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    /* ── MENÚ BAR ── */
    .menu-bar {
      background: var(--win-bg);
      padding: 2px 4px;
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--win-dark);
    }
    .menu-item {
      padding: 2px 8px;
      font-size: 12px;
      cursor: default;
      color: var(--text);
    }
    .menu-item:hover {
      background: var(--highlight);
      color: var(--highlight-txt);
    }

    /* ── BREADCRUMB / STATUS ── */
    .status-bar {
      background: var(--win-bg);
      border-top: 1px solid var(--win-dark);
      padding: 3px 6px;
      display: flex;
      gap: 8px;
      font-size: 11px;
      color: var(--text-2);
    }
    .status-panel {
      border-top:   1px solid var(--win-darker);
      border-left:  1px solid var(--win-darker);
      border-right: 1px solid var(--win-light);
      border-bottom:1px solid var(--win-light);
      padding: 1px 6px;
      flex: 1;
    }
    .status-panel span { color: var(--title-bar); font-weight: bold; }

    /* ── CONTENIDO INTERIOR ── */
    .win-content {
      padding: 12px;
    }

    /* ── TÍTULOS ── */
    .win-h2 {
      font-size: 14px;
      font-weight: bold;
      color: var(--title-bar);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .win-h2::before {
      content: '';
      display: inline-block;
      width: 10px;
      height: 10px;
      background: var(--title-bar);
    }
    .win-p {
      font-size: 12px;
      color: var(--text-2);
      margin-bottom: 12px;
      padding-left: 16px;
    }

    /* ── GRIDS DE BOTONES ── */
    .level-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }
    .topic-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    /* ── BOTÓN NIVEL (grande) ── */
    .level-btn {
      background: var(--win-bg);
      border-top:    2px solid var(--win-light);
      border-left:   2px solid var(--win-light);
      border-right:  2px solid var(--win-darker);
      border-bottom: 2px solid var(--win-darker);
      padding: 10px 12px;
      cursor: pointer;
      text-align: left;
      font-family: 'Arial', sans-serif;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .level-btn:active {
      border-top:    2px solid var(--win-darker);
      border-left:   2px solid var(--win-darker);
      border-right:  2px solid var(--win-light);
      border-bottom: 2px solid var(--win-light);
    }
    .level-btn:hover { background: #D4D0C8; }
    .lv-code {
      font-size: 22px;
      font-weight: bold;
      color: var(--title-bar);
      font-family: 'Courier New', monospace;
    }
    .lv-name { font-size: 12px; color: var(--text); font-weight: bold; }
    .lv-count { font-size: 11px; color: var(--text-2); }

    /* ── BOTÓN TEMA ── */
    .topic-btn {
      background: var(--win-bg);
      border-top:    2px solid var(--win-light);
      border-left:   2px solid var(--win-light);
      border-right:  2px solid var(--win-darker);
      border-bottom: 2px solid var(--win-darker);
      padding: 8px 10px;
      cursor: pointer;
      text-align: left;
      font-family: 'Arial', sans-serif;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .topic-btn:active {
      border-top:    2px solid var(--win-darker);
      border-left:   2px solid var(--win-darker);
      border-right:  2px solid var(--win-light);
      border-bottom: 2px solid var(--win-light);
    }
    .topic-btn:hover { background: #D4D0C8; }
    .t-icon { font-size: 18px; }
    .t-name { font-size: 12px; font-weight: bold; color: var(--text); }
    .t-count { font-size: 11px; color: var(--text-2); }

    /* ── BOTÓN ALEATORIO ── */
    .random-btn {
      width: 100%;
      background: var(--win-bg);
      border-top:    2px solid var(--win-light);
      border-left:   2px solid var(--win-light);
      border-right:  2px solid var(--win-darker);
      border-bottom: 2px solid var(--win-darker);
      padding: 7px 12px;
      cursor: pointer;
      font-family: 'Arial', sans-serif;
      font-size: 12px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      text-align: left;
    }
    .random-btn:active {
      border-top:    2px solid var(--win-darker);
      border-left:   2px solid var(--win-darker);
      border-right:  2px solid var(--win-light);
      border-bottom: 2px solid var(--win-light);
    }
    .random-btn:hover { background: #D4D0C8; }
    .r-icon { font-size: 16px; }
    .r-text { flex: 1; }
    .r-sub { font-size: 10px; color: var(--text-2); font-weight: normal; display: block; }

    /* ── BOTONES VOLVER / ACCIÓN ── */
    .win-btn {
      background: var(--win-bg);
      border-top:    2px solid var(--win-light);
      border-left:   2px solid var(--win-light);
      border-right:  2px solid var(--win-darker);
      border-bottom: 2px solid var(--win-darker);
      padding: 4px 12px;
      cursor: pointer;
      font-family: 'Arial', sans-serif;
      font-size: 12px;
      min-width: 75px;
    }
    .win-btn:active {
      border-top:    2px solid var(--win-darker);
      border-left:   2px solid var(--win-darker);
      border-right:  2px solid var(--win-light);
      border-bottom: 2px solid var(--win-light);
      padding: 5px 11px 3px 13px;
    }
    .win-btn:hover { background: #D4D0C8; }

    /* ── TOPBAR EJERCICIOS ── */
    .ex-topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--win-dark);
    }
    .ex-title-wrap { flex: 1; }
    .ex-title {
      font-size: 13px;
      font-weight: bold;
      color: var(--title-bar);
    }
    .ex-subtitle {
      font-size: 11px;
      color: var(--text-2);
    }
    .random-reveal {
      background: var(--title-bar);
      color: #fff;
      font-size: 10px;
      padding: 1px 6px;
      margin-left: 5px;
      font-weight: normal;
    }

    /* ── TARJETA EJERCICIO ── */
    .item-card {
      background: var(--win-light);
      border-top:    2px solid var(--win-darker);
      border-left:   2px solid var(--win-darker);
      border-right:  2px solid var(--win-light);
      border-bottom: 2px solid var(--win-light);
      padding: 10px 12px;
      margin-bottom: 8px;
    }
    .item-num {
      font-size: 10px;
      color: var(--text-2);
      font-weight: bold;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* badge */
    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: bold;
      padding: 1px 7px;
      margin-bottom: 6px;
      color: #fff;
    }
    .badge-num   { background: var(--tag-num); }
    .badge-verb  { background: var(--tag-verb); }
    .badge-pron  { background: var(--tag-pron); }
    .badge-orden { background: var(--tag-orden); }
    .badge-prep  { background: #006000; }

    .item-sentence {
      font-size: 13px;
      line-height: 1.65;
      margin-bottom: 10px;
      font-family: 'Times New Roman', serif;
    }
    .item-sentence .error {
      background: #FFFF00;
      color: #000;
      text-decoration: underline;
      text-decoration-color: #FF0000;
      text-underline-offset: 3px;
      padding: 0 2px;
    }

    /* ── INPUT Y BOTÓN COMPROBAR ── */
    .input-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .corr-input {
      flex: 1;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      padding: 3px 6px;
      background: var(--win-light);
      color: var(--text);
      border-top:    2px solid var(--win-darker);
      border-left:   2px solid var(--win-darker);
      border-right:  2px solid var(--win-light);
      border-bottom: 2px solid var(--win-light);
      outline: none;
    }
    .corr-input:focus {
      outline: 1px dotted var(--title-bar);
      outline-offset: 1px;
    }
    .corr-input::placeholder { color: #999; font-style: italic; }
    .check-btn { /* reutiliza .win-btn */ }

    /* ── FEEDBACK ── */
    .feedback {
      font-size: 12px;
      margin-top: 7px;
      padding: 4px 8px;
      display: none;
      font-weight: bold;
    }
    .feedback.correct   { background: var(--ok-bg);   color: var(--ok-txt);   display: block; }
    .feedback.incorrect { background: var(--err-bg);  color: var(--err-txt);  display: block; }
    .feedback.show-ans  { background: var(--warn-bg); color: var(--warn-txt); display: block; }

    .note {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 5px;
      padding-left: 8px;
      border-left: 3px solid var(--win-dark);
      line-height: 1.5;
    }

    /* ── ACCIONES INFERIORES ── */
    .ex-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--win-dark);
    }

    /* ── PUNTUACIÓN ── */
    .score-bar {
      margin-top: 8px;
      background: var(--win-bg);
      border-top:    2px solid var(--win-darker);
      border-left:   2px solid var(--win-darker);
      border-right:  2px solid var(--win-light);
      border-bottom: 2px solid var(--win-light);
      padding: 8px 12px;
      display: none;
      align-items: baseline;
      gap: 8px;
    }
    .score-bar.visible { display: flex; }
    .score-num {
      font-family: 'Courier New', monospace;
      font-size: 20px;
      font-weight: bold;
      color: var(--title-bar);
    }
    .score-label { font-size: 12px; color: var(--text-2); }

    /* ── SELECTOR SCREEN ── */
    .selector-screen { display: none; }
    .selector-screen.active { display: block; }
    .exercise-screen { display: none; }
    .exercise-screen.active { display: block; }

    /* ── SEPARADOR ── */
    .win-hr {
      border: none;
      border-top: 1px solid var(--win-darker);
      border-bottom: 1px solid var(--win-light);
      margin: 8px 0;
    }

    /* ── ACTIVIDAD TIPO OPCIÓN MÚLTIPLE ── */
    .mc-passage {
      background: var(--win-light);
      border-top:    2px solid var(--win-darker);
      border-left:   2px solid var(--win-darker);
      border-right:  2px solid var(--win-light);
      border-bottom: 2px solid var(--win-light);
      padding: 12px 14px;
      margin-bottom: 14px;
      font-family: 'Times New Roman', serif;
      font-size: 13px;
      line-height: 1.85;
    }
    .mc-passage .blank {
      display: inline-block;
      min-width: 28px;
      font-weight: bold;
      color: var(--title-bar);
      background: #E8E8FF;
      padding: 0 5px;
      border-bottom: 2px solid var(--title-bar);
      font-family: 'Arial', sans-serif;
      font-size: 12px;
    }
    .mc-part-label {
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--title-bar);
      background: var(--win-bg);
      border-top:    2px solid var(--win-light);
      border-left:   2px solid var(--win-light);
      border-right:  2px solid var(--win-darker);
      border-bottom: 2px solid var(--win-darker);
      padding: 3px 10px;
      display: inline-block;
      margin-bottom: 8px;
    }
    .mc-question {
      background: var(--win-light);
      border-top:    2px solid var(--win-darker);
      border-left:   2px solid var(--win-darker);
      border-right:  2px solid var(--win-light);
      border-bottom: 2px solid var(--win-light);
      padding: 10px 12px;
      margin-bottom: 8px;
    }
    .mc-q-num {
      font-size: 10px;
      font-weight: bold;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .mc-q-text {
      font-family: 'Times New Roman', serif;
      font-size: 13px;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .mc-options { display: flex; flex-direction: column; gap: 5px; }
    .mc-option {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 4px 6px;
      font-size: 12px;
    }
    .mc-option input[type="radio"] { accent-color: var(--title-bar); cursor: pointer; }
    .mc-option:hover { background: #D4D0C8; }
    .mc-option.selected-correct { background: var(--ok-bg); color: var(--ok-txt); font-weight: bold; }
    .mc-option.selected-incorrect { background: var(--err-bg); color: var(--err-txt); }
    .mc-option.reveal-correct { background: var(--ok-bg); color: var(--ok-txt); font-weight: bold; }
    .mc-note {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 5px;
      padding-left: 8px;
      border-left: 3px solid var(--win-dark);
      line-height: 1.5;
      display: none;
    }
    .mc-note.visible { display: block; }

    @media (max-width: 480px) {
      .level-grid, .topic-grid { grid-template-columns: 1fr; }
      body { padding: 4px; }
    }
  </style>
</head>
<body>

<div class="main-window raised">

  <!-- BARRA DE TÍTULO -->
  <div class="title-bar">
    <div class="title-bar-text">
      <span class="title-icon">📚</span>
      Actividades para la clase de español
    </div>
    <div class="title-buttons">
      <div class="title-btn">_</div>
      <div class="title-btn">□</div>
      <div class="title-btn">✕</div>
    </div>
  </div>

  <!-- CONTENIDO -->
  <div class="win-content">

    <!-- ══ NIVEL ══ -->
    <div id="level-screen">
      <div class="win-h2">Seleccionar tu nivel</div>
      <div class="win-p">Hacer clic en tu nivel.</div>
      <div class="level-grid" id="level-grid"></div>
    </div>

    <!-- ══ TEMAS ══ -->
    <div class="selector-screen" id="selector-screen">
      <div style="display:flex; align-items:center; gap:6px; margin-bottom:10px;">
        <button class="win-btn" onclick="goBackToLevels()">◄ Niveles</button>
      </div>
      <div class="win-h2" id="selector-title"></div>
      <div class="win-p" id="selector-desc"></div>
      <div class="topic-grid" id="topic-grid"></div>
      <hr class="win-hr">
      <button class="random-btn" onclick="startRandom()">
        <span class="r-icon">🔃</span>
        <span class="r-text">
          Aleatorio
          <span class="r-sub">randomizar</span>
        </span>
      </button>
    </div>

    <!-- ══ EJERCICIOS ══ -->
    <div class="exercise-screen" id="exercise-screen">
      <div class="ex-topbar">
        <button class="win-btn" onclick="goBackToTopics()">◄ Volver</button>
        <div class="ex-title-wrap">
          <div class="ex-title" id="ex-title"></div>
          <div class="ex-subtitle" id="ex-subtitle"></div>
        </div>
      </div>
      <div class="win-p" id="ex-desc" style="margin-bottom:10px;"></div>
      <div id="items-container"></div>
      <div class="ex-actions">
        <button class="win-btn" onclick="showAll()">Ver respuestas</button>
        <button class="win-btn" onclick="calcScore()">Puntuación</button>
        <button class="win-btn" onclick="resetExercise()">Reiniciar</button>
      </div>
      <div class="score-bar" id="score-bar">
        <span class="score-num" id="score-num"></span>
        <span class="score-label" id="score-label"></span>
      </div>
    </div>

  </div><!-- /win-content -->

  <!-- BARRA DE ESTADO -->
  <div class="status-bar">
    <div class="status-panel" id="status-panel">Listo</div>
    <div class="status-panel" style="flex:0; min-width:90px; text-align:center" id="status-level"></div>
  </div>

</div><!-- /main-window -->

<script>
// ══════════════════════════════════════════════════════════
//  DATOS — mismos que VERSION-3, sin cambios
// ══════════════════════════════════════════════════════════
const levels = [
  {
    id: "A1",
    name: "Básico",
    topics: [
      {
        id: "numero",
        name: "Número",
        icon: "🙂",
        badge: "badge-num",
        label: "Número",
        desc: "Marcar el error de número (singular / plural) y escribir la respuesta correcta. ¡Importante! no hay errores en todas. Entonces, escribir 'correcto'",
        items: [
          {
            sentence: 'Necesito comprar <span class="error">una manzanas</span> en el mercado.',
            accept: ["una manzana", "manzanas", "unas manzanas"],
            ideal: "una manzana",
            note: "El artículo 'una' es singular = sustantivo 'manzana' en singular: una manzana. O en plural 'unas manzanas'"
          },
          {
            sentence: '<span class="error">Los lunes</span> voy al gimnasio.',
            accept: ["los lunes", "correcto", "el lunes"],
            ideal: "correcto",
            note: "'Los lunes' es correcto. Los días de la semana en plural = rutina o hábito. 'El lunes' es correcto también = un solo dia"
          },
          {
            sentence: '<span class="error">Las luz</span> del cuarto está apagada.',
            accept: ["la luz"],
            ideal: "la luz",
            note: "'Luz' es un sustantivo singular femenino. El artículo es: la luz."
          },
          {
            sentence: 'Hay <span class="error">tres silla</span> en la cocina.',
            accept: ["tres sillas"],
            ideal: "tres sillas",
            note: "el sustantivo es plural: tres sillas."
          },
          {
            sentence: 'Tengo <span class="error">dos hermano</span> y una hermana.',
            accept: ["dos hermanos"],
            ideal: "dos hermanos",
            note: "'Dos' es plural: dos hermanos."
          },
          {
            sentence: '<span class="error">El martes</span> tengo clase de español.',
            accept: ["el martes", "correcto", "los martes"],
            ideal: "correcto",
            note: "En un día específico de la semana usar el singular con artículo: el martes. En plural = rutina o hábito"

//  ESTADO
// ══════════════════════════════════════════
let currentLevel = null;
let currentTopic = null;
let isRandom     = false;

// ══════════════════════════════════════════
//  STATUS BAR
// ══════════════════════════════════════════
function setStatus(msg, level) {
  document.getElementById('status-panel').textContent = msg;
  document.getElementById('status-level').textContent = level ? 'Nivel: ' + level : '';
}

// ══════════════════════════════════════════
//  NIVEL
// ══════════════════════════════════════════
function buildLevelSelector() {
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';
  levels.forEach(lv => {
    const totalItems = lv.topics.reduce((s, t) => {
      if (t.type === 'multiplechoice') return s + t.parts.reduce((ps, p) => ps + p.questions.length, 0);
      return s + t.items.length;
    }, 0);
    const btn = document.createElement('button');
    btn.className = 'level-btn';
    btn.innerHTML = `
      <span class="lv-code">${lv.id}</span>
      <span class="lv-name">${lv.name}</span>
      <span class="lv-count">${lv.topics.length} bloque${lv.topics.length !== 1 ? 's' : ''} · ${totalItems} ejercicios</span>
    `;
    btn.onclick = () => goToTopics(lv);
    grid.appendChild(btn);
  });
  setStatus('Selecciona un nivel para comenzar.');
}

// ══════════════════════════════════════════
//  TEMAS
// ══════════════════════════════════════════
function goToTopics(level) {
  currentLevel = level;
  document.getElementById('level-screen').style.display = 'none';
  document.getElementById('selector-screen').classList.add('active');
  document.getElementById('selector-title').textContent = `Nivel ${level.id} — ¿Qué bloque quieres practicar?`;
  document.getElementById('selector-desc').textContent = 'Selecciona un bloque o elige aleatorio.';
  buildTopicGrid(level);
  setStatus('Nivel ' + level.id + ' seleccionado. Elige un bloque.', level.id);
}

function buildTopicGrid(level) {
  const grid = document.getElementById('topic-grid');
  grid.innerHTML = '';
  level.topics.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'topic-btn';
    const cnt = t.type === 'multiplechoice'
      ? t.parts.reduce((s, p) => s + p.questions.length, 0)
      : t.items.length;
    btn.innerHTML = `
      <span class="t-icon">${t.icon}</span>
      <span class="t-name">${t.name}</span>
      <span class="t-count">${cnt} ejercicio${cnt !== 1 ? 's' : ''}</span>
    `;
    btn.onclick = () => startTopic(t, false);
    grid.appendChild(btn);
  });
}

function startRandom() {
  const topic = currentLevel.topics[Math.floor(Math.random() * currentLevel.topics.length)];
  startTopic(topic, true);
}

// ══════════════════════════════════════════
//  EJERCICIOS
// ══════════════════════════════════════════
function startTopic(topic, random) {
  currentTopic = topic;
  isRandom = random;
  document.getElementById('selector-screen').classList.remove('active');
  document.getElementById('exercise-screen').classList.add('active');

  const titleEl = document.getElementById('ex-title');
  titleEl.innerHTML = random
    ? topic.name + '<span class="random-reveal">🎲 aleatorio</span>'
    : topic.name;
  document.getElementById('ex-subtitle').textContent = `Nivel ${currentLevel.id} · Corrección de errores`;
  document.getElementById('ex-desc').textContent = topic.desc || '';
  const totalQ = topic.type === 'multiplechoice'
    ? topic.parts.reduce((s, p) => s + p.questions.length, 0)
    : topic.items.length;
  buildItems(topic);
  setStatus(topic.name + ' — ' + totalQ + ' preguntas.', currentLevel.id);
}

function buildItems(topic) {
  const container = document.getElementById('items-container');
  container.innerHTML = '';

  if (topic.type === 'multiplechoice') {
    buildMultipleChoice(topic, container);
  } else {
    buildTextInput(topic, container);
  }
}

// ── Tipo texto libre (existente) ──
function buildTextInput(topic, container) {
  topic.items.forEach((item, i) => {
    const n = i + 1;
    const card = document.createElement('div');
    card.className = 'item-card';
    card.innerHTML = `
      <div class="item-num">Ejercicio ${n} de ${topic.items.length}</div>
      <span class="badge ${topic.badge}">${topic.label}</span>
      <div class="item-sentence">${item.sentence}</div>
      <div class="input-row">
        <input class="corr-input" placeholder="Escribe la forma correcta..." id="in-${n}">
        <button class="win-btn" onclick="check(${n})">Comprobar</button>
      </div>
      <div class="feedback" id="fb-${n}"></div>
      <div class="note" id="note-${n}"></div>
    `;
    container.appendChild(card);
  });
}

// ── Tipo opción múltiple ──
function buildMultipleChoice(topic, container) {
  // Texto del pasaje
  if (topic.passage) {
    const passageDiv = document.createElement('div');
    passageDiv.className = 'mc-passage';
    passageDiv.innerHTML = topic.passage.replace(/\n/g, '<br>');
    container.appendChild(passageDiv);
  }

  // Partes con preguntas
  let globalIndex = 0;
  topic.parts.forEach((part, pi) => {
    const partLabel = document.createElement('div');
    partLabel.className = 'mc-part-label';
    partLabel.textContent = part.label;
    container.appendChild(partLabel);

    part.questions.forEach((q, qi) => {
      globalIndex++;
      const qDiv = document.createElement('div');
      qDiv.className = 'mc-question';
      qDiv.id = 'mcq-' + globalIndex;
      qDiv.innerHTML = `
        <div class="mc-q-num">Pregunta ${q.num}</div>
        <div class="mc-q-text">${q.text}</div>
        <div class="mc-options" id="mco-${globalIndex}">
          ${q.options.map((opt, oi) => `
            <label class="mc-option" id="mcopt-${globalIndex}-${oi}">
              <input type="radio" name="mcq-${globalIndex}" value="${oi}" onchange="checkMC(${globalIndex}, ${oi}, ${q.correct}, ${pi}, ${qi})">
              ${opt}
            </label>
          `).join('')}
        </div>
        <div class="mc-note" id="mcnote-${globalIndex}">${q.note}</div>
      `;
      container.appendChild(qDiv);
    });
  });
}

// ══════════════════════════════════════════
//  NAVEGACIÓN
// ══════════════════════════════════════════
function goBackToTopics() {
  document.getElementById('exercise-screen').classList.remove('active');
  document.getElementById('items-container').innerHTML = '';
  document.getElementById('score-bar').classList.remove('visible');
  currentTopic = null;
  document.getElementById('selector-screen').classList.add('active');
  setStatus('Nivel ' + currentLevel.id + ' — elige un bloque.', currentLevel.id);
}

function goBackToLevels() {
  document.getElementById('selector-screen').classList.remove('active');
  document.getElementById('level-screen').style.display = '';
  currentLevel = null;
  setStatus('Selecciona un nivel para comenzar.');
}

// ══════════════════════════════════════════
//  CORRECCIÓN
// ══════════════════════════════════════════
function normalize(s) {
  return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
}

// ── Corrección texto libre ──
function check(n) {
  if (!currentTopic) return;
  const item = currentTopic.items[n - 1];
  const input = document.getElementById('in-' + n).value;
  const fb    = document.getElementById('fb-' + n);
  const note  = document.getElementById('note-' + n);
  const norm  = normalize(input);
  if (!norm) return;

  const matched = item.accept.some(a => norm.includes(normalize(a)));
  if (matched) {
    fb.className = 'feedback correct';
    fb.textContent = '✓ Correcto';
    note.textContent = item.note;
  } else {
    fb.className = 'feedback incorrect';
    fb.textContent = '✗ Revisa tu respuesta e intenta de nuevo.';
    note.textContent = '';
  }
}

// ── Corrección opción múltiple ──
function checkMC(globalIndex, selected, correct, pi, qi) {
  const optionsDiv = document.getElementById('mco-' + globalIndex);
  const noteDiv    = document.getElementById('mcnote-' + globalIndex);
  const labels     = optionsDiv.querySelectorAll('.mc-option');

  // Deshabilitar radios
  optionsDiv.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);

  labels.forEach((lbl, i) => {
    lbl.classList.remove('selected-correct', 'selected-incorrect', 'reveal-correct');
    if (i === selected && selected === correct) lbl.classList.add('selected-correct');
    else if (i === selected && selected !== correct) lbl.classList.add('selected-incorrect');
    else if (i === correct) lbl.classList.add('reveal-correct');
  });

  noteDiv.classList.add('visible');
}

function showAll() {
  if (!currentTopic) return;
  if (currentTopic.type === 'multiplechoice') {
    let g = 0;
    currentTopic.parts.forEach(part => {
      part.questions.forEach(q => {
        g++;
        const optionsDiv = document.getElementById('mco-' + g);
        if (!optionsDiv) return;
        optionsDiv.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);
        optionsDiv.querySelectorAll('.mc-option').forEach((lbl, i) => {
          lbl.classList.remove('selected-correct', 'selected-incorrect', 'reveal-correct');
          if (i === q.correct) lbl.classList.add('reveal-correct');
        });
        const noteDiv = document.getElementById('mcnote-' + g);
        if (noteDiv) noteDiv.classList.add('visible');
      });
    });
  } else {
    currentTopic.items.forEach((item, i) => {
      const n    = i + 1;
      const fb   = document.getElementById('fb-' + n);
      const note = document.getElementById('note-' + n);
      fb.className = 'feedback show-ans';
      fb.textContent = 'Respuesta: ' + item.ideal;
      note.textContent = item.note;
    });
  }
}

function calcScore() {
  if (!currentTopic) return;
  let correct = 0, total = 0;

  if (currentTopic.type === 'multiplechoice') {
    let g = 0;
    currentTopic.parts.forEach(part => {
      part.questions.forEach(q => {
        g++; total++;
        const radios = document.querySelectorAll(`input[name="mcq-${g}"]`);
        radios.forEach(r => { if (r.checked && parseInt(r.value) === q.correct) correct++; });
      });
    });
  } else {
    total = currentTopic.items.length;
    currentTopic.items.forEach((item, i) => {
      const norm = normalize(document.getElementById('in-' + (i + 1)).value);
      if (norm && item.accept.some(a => norm.includes(normalize(a)))) correct++;
    });
  }

  const bar = document.getElementById('score-bar');
  bar.classList.add('visible');
  document.getElementById('score-num').textContent = correct + '/' + total;
  const ratio = total > 0 ? correct / total : 0;
  const msgs = [
    'Sigue practicando, ¡tú puedes!.',
    '¡Ya casi!, revisa los errores con la explicación.',
    'Bien, ya puedes usar las frases correctamente.',
    '¡Excelente! Nivel completado.'
  ];
  const idx = ratio < 0.25 ? 0 : ratio < 0.5 ? 1 : ratio < 1 ? 2 : 3;
  document.getElementById('score-label').textContent = '— ' + msgs[idx];
  setStatus('Resultado: ' + correct + ' de ' + total + ' correctos.', currentLevel.id);
}

function resetExercise() {
  if (!currentTopic) return;
  if (currentTopic.type === 'multiplechoice') {
    let g = 0;
    currentTopic.parts.forEach(part => {
      part.questions.forEach(() => {
        g++;
        const optionsDiv = document.getElementById('mco-' + g);
        if (!optionsDiv) return;
        optionsDiv.querySelectorAll('input[type="radio"]').forEach(r => { r.disabled = false; r.checked = false; });
        optionsDiv.querySelectorAll('.mc-option').forEach(lbl => {
          lbl.classList.remove('selected-correct', 'selected-incorrect', 'reveal-correct');
        });
        const noteDiv = document.getElementById('mcnote-' + g);
        if (noteDiv) noteDiv.classList.remove('visible');
      });
    });
  } else {
    currentTopic.items.forEach((_, i) => {
      const n = i + 1;
      document.getElementById('in-' + n).value = '';
      const fb = document.getElementById('fb-' + n);
      fb.className = 'feedback';
      fb.textContent = '';
      document.getElementById('note-' + n).textContent = '';
    });
  }
  document.getElementById('score-bar').classList.remove('visible');
  setStatus('Ejercicio reiniciado.', currentLevel.id);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.classList.contains('corr-input')) {
    check(parseInt(e.target.id.replace('in-', '')));
  }
});

buildLevelSelector();
